name: Release

# Publishes a signed release APK to the Releases tab whenever a version tag is
# pushed (e.g. `v1.0`). Can also be run manually against an existing tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. v1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # Optional signing: if the repo has a RELEASE_KEYSTORE_BASE64 secret set,
      # decode it and hand its path to Gradle. Without it, the release build
      # falls back to the debug key (still installable) — see composeApp/build.gradle.kts.
      - name: Decode release keystore
        id: keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :composeApp:assembleRelease

      - name: Rename APKs
        id: apk
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          DIR=composeApp/build/outputs/apk/release
          ls -la "$DIR"   # handy for debugging future output changes
          cp "$DIR/composeApp-universal-release.apk"  "localmathy-${TAG}-universal.apk"
          cp "$DIR/composeApp-arm64-v8a-release.apk"  "localmathy-${TAG}-arm64-v8a.apk"
          cp "$DIR/composeApp-x86_64-release.apk"     "localmathy-${TAG}-x86_64.apk"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: LocalMathy ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            localmathy-*-universal.apk
            localmathy-*-arm64-v8a.apk
            localmathy-*-x86_64.apk
